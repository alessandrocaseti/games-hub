<!DOCTYPE html>

<html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title id="pageTitle"></title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="settings.css">
        <link rel="stylesheet" href="texts.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700,800,900&display=swap">
        <link rel="icon" type="image/x-icon" href="assets/logo.png">
        <script src="script.js"></script>
        <script src="numbers.js"></script>
        <script src="memory.js"></script>
        <script src="quiz.js"></script>
        <script src="language.js"></script>
        <script src="audio.js"></script>
        <script src="users.js"></script>
        <script src="settings.js"></script>
    </head>

    <body id="main" class="default-bg" style="color: #FFFFFF; font-size: 20px; font-weight: 750;">

        <!-- NavigationButtons -->

        <button id="homeButton" onclick="backToHome()" class="defaultButton" onmouseover="playSecondaryClick()"
                style="width: 200px; height: 30px; display: none; margin-left: 20px; margin-top: 34px;"></button>

        <div style="display: flex; justify-content: right; margin-right: 2vh; margin-top: 2vh;">
            <button id="settingsButton" class="memoryButton" onclick="showSettings()" onmouseover="playSecondaryClick()"
                    style="background-image: url('assets/icons/settings.png'); width: 5vh; height: 5vh; background-size: cover;"></button>
        </div>

        <!-- CurrentUserOverlay -->

        <div id="currentUserDiv" style="display: none; flex-direction: row; justify-content: right; margin-top: -4vh;">
            <img id="currentUserPic" style="width: 6vh; height: 6vh; margin-right: 8vh;">
            <div>
                <h1 id="currentUserName" style="margin-left: -7vh; margin-top: 0vh; font-size: 26px; margin-right: 4vh;"></h1>
                <h2 id="currentUserXP" style="font-weight: 500; font-size: 16px; margin-top: -2vh; margin-left: -7vh; margin-right: 4vh;"></h2>
            </div>
        </div>

        <!-- Home -->

        <div id="home" style="text-align: center; margin-top: 40px;">

            <img id="ghLogo" src="assets/logo.png" class="defaultImage" style="width: 28vh; height: 28vh; margin-top: -4vh;">

            <div id="homeTitleDiv" style="text-align: center; margin-bottom: 20px;">

                <h1 id="mainTitle" class="glow" style="font-size: 90px; font-weight: 750; margin-top: -30px;"></h1>
                <p id="welcomeText" style="font-size: 20px; font-weight: 500; margin-top: -50px;"></p>
                <p id="chooseGameText" style="font-size: 20px; font-weight: 500;"></p>

            </div>

            <!-- MainButtons -->

            <div id="gameButtonsDiv" style="margin-top: 50px;">

                <button id="game1" class="defaultButton gameButton"
                        onclick="loadGame1()" onmouseover="playSecondaryClick()"></button>

                <button id="game2" class="defaultButton gameButton"
                        onclick="loadGame2()" onmouseover="playSecondaryClick()"></button>

                <button id="game3" class="defaultButton gameButton"
                        onclick="loadGame3()" onmouseover="playSecondaryClick()"></button>

                <button id="game4" class="defaultButton gameButton"
                        onclick="loadGame4()" onmouseover="playSecondaryClick()"></button>

            </div>

        </div>

        <!-- GUESS THE RANDOM NUMBER HARD VERSION -->

        <div id="gameFrame1" style="margin-top: 20px; display: none; text-align: center;">

            <h1 id="game1Title" style="font-size: 50px;"></h1>

            <div id="game1MinMaxValues">
                <h1 id="valuesTitle" style="font-size: 30px; font-weight: 700;"></h1>
                <form id="formSetMinMax" onsubmit="setMinMaxValues(event)" style="display: block; text-align: center; margin-top: 20px;">
                    <input id="minValue" type="number" class="defaultInputBox" min="0" onfocus="playSecondaryClick()">
                    <input id="maxValue" type="number" class="defaultInputBox" onfocus="playSecondaryClick()" autocomplete="off">
                    <button id="inputButton" type="submit" class="defaultButton"></button>
                </form>
            </div>

            <div id="gameSetup" style="display: none; align-items: center; margin-top: -30px;">
                <h1 id="gameTitle" style="font-size: 30px; font-weight: 700;"></h1>
                <form id="formStartGame" onsubmit="startGame1(event)" style="display:inline-block; margin-top: -20px;">
                    <input id="inputBox" type="number" class="defaultInputBox" autocomplete="off" onfocus="playSecondaryClick()">
                    <button id="inputButton2" type="submit" class="defaultButton" style="width: 100px; margin: 5px; height: 36px"></button>
                </form>
                <button id="editValuesButton" class="defaultButton" onclick="editValuesGame1()" style="display: inline-block; width: 100px; height: 36px; margin: 5px;"></button>
            </div>

            <h1 id="generatedNumber1" style="font-size: 200px; margin-top: 60px;"></h1>
            <h1 id="test" style="font-size: 70px; margin-top: -100px;"></h1>
            <h2 id="statsGame1" style="font-size: 30px; margin-top: 0px; font-weight: 400;"></h2>
        </div>

        <!-- GUESS THE RANDOM NUMBER EASY VERSION -->

        <div id="gameFrame2" style="margin-top: 20px; display: none; text-align: center;">

            <h1 id="game2Title" style="font-size: 50px;"></h1>

            <div id="game2MinMaxValues">
                <h1 id="valuesTitle2" style="font-size: 30px; font-weight: 700;"></h1>
                <form id="formSetMinMax2" onsubmit="setMinMaxValues(event)" style="display: block; text-align: center; margin-top: 20px;">
                    <input id="minValue2" type="number" class="defaultInputBox" min="0" onfocus="playSecondaryClick()">
                    <input id="maxValue2" type="number" class="defaultInputBox" onfocus="playSecondaryClick()">
                    <button id="inputButton3" type="submit" class="defaultButton"></button>
                </form>
            </div>

            <div id="gameSetup2" style="display: none; align-items: center; margin-top: -30px;">
                <h1 id="gameTitle2" style="font-size: 30px; font-weight: 700;"></h1>
                <form id="formStartGame2" onsubmit="startGame2(event)" style="display:inline-block; margin-top: -20px;">
                    <input id="inputBox2" type="number" class="defaultInputBox" onfocus="playSecondaryClick()">
                    <button id="inputButton4" type="submit" class="defaultButton" style="height: 36px; margin: 5px;"></button>
                </form>
                <button id="editValuesButton2" class="defaultButton" onclick="editValuesGame2()" style="display: inline-block; width: 100px; height: 36px; margin: 5px;"></button>
            </div>

            <div id="cancellami" style="display: none; text-align: center; align-items: center;">
                <h1 id="generatedNumber2" style="font-size: 200px; margin-top: 70px;"></h1>
                <h1 id="test2" style="font-size: 70px; margin-top: -100px;"></h1>
                <h2 id="hintGame2" style="font-size: 50px; margin-top: -40px; font-weight: 400;"></h2>
                <h2 id="statsGame2" style="font-size: 30px; margin-top: -40px; font-weight: 400;"></h2>
            </div>

        </div>

        <!-- Memory -->

        <div id="memory" style="display: none;">
            <div style="text-align: center;">
                <h1 id="game3Title" class="textAnimaton" style="font-size: 70px; user-select: none; margin-top: -3vh;"></h1>
            </div>

            <div id="gameProgress3" class="defaultProgressBar" style="margin-top: -4vh;">
                <progress id="progressBar3" max="100" style="height: 16px; width: 89.5%;"></progress>
            </div>

            <div id="gameFrame3" style="text-align: center;"></div>
        </div>

        <!-- Quiz -->

        <div id="gameProgress4" class="defaultProgressBar" style="display: none;">
            <progress id="progressBar4" max="100" style="height: 16px; width: 85%; margin-bottom: -120px;"></progress>
        </div>

        <div id="gameFrame4" style="margin-top: 20px; display: none; text-align: center;">

            <div style="display: flex; justify-content: right;">

                <button id="nextQuestionButton" onclick="loadQuiz(true)" class="defaultButton" onmouseover="playSecondaryClick()" b
                        style="width: 200px; height: 30px; margin-right: 4vh; margin-top: -40px;"></button>

            </div>

            <h1 id="game4MessageInfo" style="font-size: 50px; user-select: none; width: auto; height: 30px; margin-top: -20px;"></h1>
            <h1 id="game4Title" style="font-size: 120px; letter-spacing: 36px; text-align: center; margin-top: 160px;"></h1>
            <h1 id="game4Title2" style="font-size: 120px; letter-spacing: 36px; text-align: center; margin-top: -40px;"></h1>
            <h2 id="game4Tip" style="font-size: 30px;"></h2>

            <form onsubmit="checkAnswer(event, 0)">
                <input id="inputGame4" type="text" class="defaultInputBox" style="width: 300px;" autocomplete="off" onfocus="playSecondaryClick()">
            </form>

        </div>

        <!-- UserSelectionPage -->

        <div id="userSelection" style="display: none; text-align: center;">
            <h1 id="selectUser" style="margin: 10vh;"></h1>
            <div style="display: flex; flex-direction: row; margin: 0 auto; margin-top: 10vh; margin-left: auto; margin-right: auto; justify-content: center;">
                <div id="userSelection0" class="userCard" onclick="selectUser(0, true)" onmouseover="playSecondaryClick()">
                    <img id="userCardPic0" style="width: 20vh; height: 20vh; margin: 18vh; margin-top: 4vh; margin-bottom: 0vh; grid-area: 1 / 1 / 3 / 3;">
                    <h1 id="userCardName0" style="grid-area: 3 / 1 / 4 / 3; user-select: none;"></h1>
                    <h2 id="userCardXP0" style="grid-area: 4 / 1 / 5 / 3; font-weight: 500; user-select: none;"></h2>
                </div>
                <div id="userSelection1" class="userCard" onclick="selectUser(1, true)" onmouseover="playSecondaryClick()">
                    <img id="userCardPic1" style="width: 20vh; height: 20vh; margin: 18vh; margin-top: 4vh; margin-bottom: 0vh; grid-area: 1 / 1 / 3 / 3;">
                    <h1 id="userCardName1" style="grid-area: 3 / 1 / 4 / 3; user-select: none;"></h1>
                    <h2 id="userCardXP1" style="grid-area: 4 / 1 / 5 / 3; font-weight: 500; user-select: none;"></h2>
                </div>
                <div id="userSelection2" class="userCard" onclick="selectUser(2, true)" onmouseover="playSecondaryClick()" style="display: none;">
                    <img id="userCardPic2" style="width: 20vh; height: 20vh; margin: 18vh; margin-top: 4vh; margin-bottom: 0vh; margin-left: 8vh; grid-area: 1 / 1 / 3 / 3;">
                    <h1 id="userCardName2" style="grid-area: 3 / 1 / 4 / 3; user-select: none;"></h1>
                    <h2 id="userCardXP2" style="grid-area: 4 / 1 / 5 / 3; font-weight: 500; user-select: none; margin-top: 6vh;"></h2>
                </div>
                <div id="userSelection3" class="userCard" onclick="selectUser(3, true)" onmouseover="playSecondaryClick()" style="display: none;">
                    <img id="userCardPic3" style="width: 20vh; height: 20vh; margin: 18vh; margin-top: 4vh; margin-bottom: 0vh; margin-left: 8vh; grid-area: 1 / 1 / 3 / 3;">
                    <h1 id="userCardName3" style="grid-area: 3 / 1 / 4 / 3; user-select: none;"></h1>
                    <h2 id="userCardXP3" style="grid-area: 4 / 1 / 5 / 3; font-weight: 500; user-select: none; margin-top: 6vh;"></h2>
                </div>
            </div>
        </div>

        <!-- Settings -->

        <div id="settingsPage" style="text-align: center; display: none; margin-top: 10vh;">

            <h1 id="settingsTitle" style="font-size: 50px; margin-top: -60px;"></h1>

            <!-- Settings::InfoBanner -->

            <div class="banner" style="width: 50%;">
                <div class="bannerIcon">
                    <h2 class="fontIcon" style="color: yellow; font-size: 32px; margin-left: 10vh; margin-top: 20px;"></h2>
                </div>
                <div style="width: 100vh; margin-left: 2vh; margin-top: -4px; text-align: left;">
                    <h4 id="settingsSavedBannerText"></h4>
                </div>
            </div>

            <div class="settingsHeader">
                <h2 class="fontIcon settingsHeaderIcon"></h2>
                <h3 id="soundSettingsTitle" class="settingsHeaderText"></h3>
            </div>

            <!-- Settings::EnableSoundtrack -->

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="soundtrackCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="soundtrackCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <label class="switch" onmouseover="playSecondaryClick()">
                        <input type="checkbox" checked id="soundtrackToggle" onchange="toggleSoundtrack()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Settings::VolumeSoundtrack -->

            <div class="settingsCard" id="volumeSoundtrack">
                <div class="settingsCardTitle">
                    <h2 id="soundtrackVolCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="soundtrackVolCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 32px; margin-right: 3vh;">
                    <input type="range" min="1" max="100" value="50" class="sliderVolume" id="sliderVolume" onmouseover="playSecondaryClick()" onchange="setSoundtrackVolume()" oninput="updateSliderFill(this)" style="margin-right: 220px;">
                </div>
            </div>

            <!-- Settings::EnableEffects -->

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="sfxCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="sfxCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <label class="switch" onmouseover="playSecondaryClick()">
                        <input type="checkbox" checked id="effectsToggle" onchange="toggleEffects()" onmouseover="playSecondaryClick()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Settings::VolumeEffects -->

            <div class="settingsCard" id="volumeEffects">
                <div class="settingsCardTitle">
                    <h2 id="sfxVolCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="sfxVolCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 32px; margin-right: 3vh;">
                    <input type="range" min="1" max="100" value="50" class="sliderVolume" id="sliderEffects" onmouseover="playSecondaryClick()" onchange="setEffectsVolume()" oninput="updateSliderFill(this)" style="margin-right: 220px;">
                </div>
            </div>

            <div class="settingsHeader">
                <h2 class="fontIcon settingsHeaderIcon"></h2>
                <h3 id="gamesSettingsTitle" class="settingsHeaderText"></h3>
            </div>

            <!-- Settings::MemoryImages -->

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="memoryImagesCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="memoryImagesCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <select id="memoryImages" class="defaultSelect" style="margin-right: 30px;" onchange="setMemoryImages()" onmouseover="playSecondaryClick()">
                        <option id="memoryImagesFlagsOption" value="flags"></option>
                        <option id="memoryImagesStreamersOption" value="streamers"></option>
                    </select>
                </div>
            </div>

            <!-- Settings::MemoryDifficulty -->

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="memoryDifficultyCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="memoryDifficultyCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <select id="memoryDifficulty" class="defaultSelect" style="margin-right: 30px;" onchange="setMemoryDifficulty()" onmouseover="playSecondaryClick()">
                        <option id="memoryDifficultyOption1" value="18"></option>
                        <option id="memoryDifficultyOption2" value="24"></option>
                        <option id="memoryDifficultyOption3" value="32"></option>
                        <option id="memoryDifficultyOption4" value="40"></option>
                    </select>
                </div>
            </div>

            <!-- Settings::QuizDifficulty -->

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="quizDifficultyCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="quizDifficultyCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <select id="quizDifficulty" class="defaultSelect" style="margin-right: 30px;" onchange="setQuizDifficulty()" onmouseover="playSecondaryClick()">
                        <option id="quizDifficultyOption1" value="3"></option>
                        <option id="quizDifficultyOption2" value="2"></option>
                        <option id="quizDifficultyOption3" value="1.5"></option>
                        <option id="quizDifficultyOption4" value="1.1"></option>
                    </select>
                </div>
            </div>

            <!-- Settings::Users -->

            <div class="settingsHeader">
                <h2 class="fontIcon settingsHeaderIcon"></h2>
                <h3 id="usersSettingsTitle" class="settingsHeaderText"></h3>
            </div>

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="enableUsersCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="enableUsersCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <label class="switch" onmouseover="playSecondaryClick()">
                        <input type="checkbox" id="usersToggle" onchange="toggleUsers()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Settings::CreateUser -->

            <div class="settingsCard" id="addUserCard">
                <div class="settingsCardTitle">
                    <h2 id="addUserCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <div style="display: flex; flex-direction: row;">
                        <h4 id="addUserCardDescription"></h4>
                        <h4 id="addUserInfoText" style="margin-left: 6px;">(0/4)</h4>
                    </div>
                </div>
                <div class="settingsCardControl" style="margin: 0 auto; margin-top: 8px; margin-right: 20px;">
                    <button onclick="openUserDialog()" class="defaultButton" onmouseover="playSecondaryClick()" style="font-family: iconFont; font-size: 24px; width: 10vh; height: 6vh;"></button>
                </div>
            </div>

            <!-- Settings::UserCards -->

            <div id="appendChildDiv">
                <div class="newUserDiv" id="user0" style="display: none;">
                    <img id="userPic0" class="newUserPic">
                    <h2 id="userName0" class="newUserName"></h2>
                    <h3 id="userXP0" class="newUserXP"></h3>
                    <div class="newUserDelete" style="margin: 0 auto; margin-top: 8px; margin-right: 20px;">
                        <button class="defaultButton" onmouseover="playSecondaryClick()" onclick="deleteUser(0, false)" style="font-family: iconFont; width: 10vh; height: 6vh; font-size: 24px;"></button>
                    </div>
                </div>
                <div class="newUserDiv" id="user1" style="display: none;">
                    <img id="userPic1" class="newUserPic">
                    <h2 id="userName1" class="newUserName"></h2>
                    <h3 id="userXP1" class="newUserXP"></h3>
                    <div class="newUserDelete" style="margin: 0 auto; margin-top: 8px; margin-right: 20px;">
                        <button class="defaultButton" onmouseover="playSecondaryClick()" onclick="deleteUser(1, false)" style="font-family: iconFont; width: 10vh; height: 6vh; font-size: 24px;"></button>
                    </div>
                </div>
                <div class="newUserDiv" id="user2" style="display: none;">
                    <img id="userPic2" class="newUserPic">
                    <h2 id="userName2" class="newUserName"></h2>
                    <h3 id="userXP2" class="newUserXP"></h3>
                    <div class="newUserDelete" style="margin: 0 auto; margin-top: 8px; margin-right: 20px;">
                        <button class="defaultButton" onmouseover="playSecondaryClick()" onclick="deleteUser(2, false)" style="font-family: iconFont; width: 10vh; height: 6vh; font-size: 24px;"></button>
                    </div>
                </div>
                <div class="newUserDiv" id="user3" style="display: none;">
                    <img id="userPic3" class="newUserPic">
                    <h2 id="userName3" class="newUserName"></h2>
                    <h3 id="userXP3" class="newUserXP"></h3>
                    <div class="newUserDelete" style="margin: 0 auto; margin-top: 8px; margin-right: 20px;">
                        <button class="defaultButton" onmouseover="playSecondaryClick() " onclick="deleteUser(3, false)" style="font-family: iconFont; width: 10vh; height: 6vh; font-size: 24px;"></button>
                    </div>
                </div>
            </div>

            <!-- Settings::NewUserDialog -->

            <div id="box">
                <h1 id="createNewUser" style="margin-top: 10px;"></h1>
                <p id="selectAvatar" style="margin-top: -30px; font-weight: 500;"></p>
                <div style="display: flex; flex-direction: row; text-align: center; margin: 0 auto; margin-top: -20px;">
                    <button id="avatar1" onclick="selectAvatar(1)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                    <button id="avatar2" onclick="selectAvatar(2)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                    <button id="avatar3" onclick="selectAvatar(3)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                    <button id="avatar4" onclick="selectAvatar(4)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                </div>
                <div style="display: flex; flex-direction: row; text-align: center; margin: 0 auto; margin-top: -10px;">
                    <button id="avatar5" onclick="selectAvatar(5)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                    <button id="avatar6" onclick="selectAvatar(6)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                    <button id="avatar7" onclick="selectAvatar(7)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                    <button id="avatar8" onclick="selectAvatar(8)" class="defaultButton avatarButton" onmouseover="playSecondaryClick()"></button>
                </div>
                <div style="text-align: center;">
                    <input id="newUserName" type="text" class="defaultInputBox" style="width: 24vh;" onfocus="playSecondaryClick()">
                </div>
                <div>
                    <button id="cancelUserDialogButton" class="defaultButton" style="width: 12vh; margin-right: 2vh;" onclick="closeUserDialog()" onmouseover="playSecondaryClick()"></button>
                    <button id="saveUserDialogButton" class="defaultButton" style="width: 12vh;" onclick="addUser()" onmouseover="playSecondaryClick()"></button>
                </div>
            </div>

            <button style="display: none;" onclick="debug()">DEBUG USERS</button>

            <!-- Settings::Language -->

            <div class="settingsHeader">
                <h2 class="fontIcon settingsHeaderIcon"></h2>
                <h3 id="languageSettingsTitle" class="settingsHeaderText"></h3>
            </div>

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="languageCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="languageCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="display: flex; flex-direction: row; margin-top: 1vh; margin-right: 2vh;">
                    <button id="italianButton" class="defaultButton" onclick="setLanguage('it', true)" onmouseover="playSecondaryClick()"
                            style="background-image: url('https://raw.githubusercontent.com/kapowaz/square-flags/395a3335100d1e1f361daf8508d9d9c17e28962e/flags-original/it.svg'); width: 6vh; height: 6vh; margin-right: 1vh;"></button>
                    <button id="englishButton" class="defaultButton" onclick="setLanguage('en', true)" onmouseover="playSecondaryClick()"
                            style="background-image: url('https://raw.githubusercontent.com/kapowaz/square-flags/395a3335100d1e1f361daf8508d9d9c17e28962e/flags-original/uk.svg'); width: 6vh; height: 6vh;"></button>
                </div>
            </div>

            <!-- Settings::Theme -->

            <div class="settingsHeader">
                <h2 class="fontIcon settingsHeaderIcon"></h2>
                <h3 id="interfaceSettingsTitle" class="settingsHeaderText"></h3>
            </div>

            <div class="settingsCard">
                <div class="settingsCardTitle">
                    <h2 id="themeCardTitle"></h2>
                </div>
                <div class="settingsCardDescription">
                    <h4 id="themeCardDescription"></h4>
                </div>
                <div class="settingsCardControl" style="margin-top: 30px;">
                    <label class="switch" onmouseover="playSecondaryClick()">
                        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Settings::About -->

            <div class="settingsHeader">
                <h2 class="fontIcon settingsHeaderIcon"></h2>
